<div class="min-h-screen flex items-center justify-center bg-background px-4 py-12 sm:px-6 lg:px-8">
  <div class="w-full max-w-md space-y-8">
    
    <!-- Logo & Header -->
    <div class="text-center">
      <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-primary">
        <ng-icon name="lucideWallet" class="h-8 w-8 text-primary-foreground"></ng-icon>
      </div>
      <h2 class="mt-6 text-3xl font-bold tracking-tight text-foreground">
        Welcome back
      </h2>
      <p class="mt-2 text-sm text-muted-foreground">
        Enter your credentials to access your account
      </p>
    </div>

    <!-- Login Card -->
    <div class="mt-8 rounded-2xl border border-border bg-card p-6 shadow-sm sm:p-8">
      <form class="space-y-6" (submit)="onSubmit($event)">
        
        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-medium text-card-foreground">
            Email address
          </label>
          <div class="relative mt-2">
            <ng-icon name="lucideMail" class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-muted-foreground"></ng-icon>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              placeholder="name@example.com"
              class="w-full rounded-xl border border-border bg-input py-3 pl-11 pr-4 text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-shadow"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <div class="flex items-center justify-between">
            <label for="password" class="block text-sm font-medium text-card-foreground">
              Password
            </label>
            <a href="#" class="text-sm font-medium text-primary hover:text-primary/80 transition-colors">
              Forgot password?
            </a>
          </div>
          <div class="relative mt-2">
            <ng-icon name="lucideLock" class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-muted-foreground"></ng-icon>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              placeholder="••••••••"
              class="w-full rounded-xl border border-border bg-input py-3 pl-11 pr-4 text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-shadow"
            />
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading() || !email() || !password()"
          class="group relative flex w-full justify-center rounded-xl bg-primary px-4 py-3 text-sm font-semibold text-primary-foreground transition-all hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (isLoading()) {
            <span class="flex items-center gap-2">
              <span class="h-4 w-4 animate-spin rounded-full border-2 border-primary-foreground border-t-transparent"></span>
              Signing in...
            </span>
          } @else {
            <span class="flex items-center gap-2">
              Sign in
              <ng-icon name="lucideArrowRight" class="h-4 w-4 transition-transform group-hover:translate-x-1"></ng-icon>
            </span>
          }
        </button>
      </form>
    </div>

    <!-- Sign up Link -->
    <p class="text-center text-sm text-muted-foreground">
      Don't have an account?
      <a href="#" class="font-medium text-primary hover:text-primary/80 transition-colors">
        Sign up for free
      </a>
    </p>

  </div>
</div>
