<div class="flex min-h-screen bg-background">
  <!-- Mobile Header -->
  <header class="fixed top-0 left-0 right-0 z-50 flex h-14 items-center justify-between border-b border-sidebar-border bg-sidebar px-4 lg:hidden">
    <button
      (click)="store.setMobileOpen(true)"
      class="flex items-center justify-center rounded-md p-2 text-sidebar-foreground hover:bg-sidebar-accent"
      aria-label="Open menu"
    >
      <ng-icon name="lucideMenu" class="h-5 w-5"></ng-icon>
    </button>
    <div class="flex items-center gap-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary">
        <span class="text-sm font-bold text-primary-foreground">F</span>
      </div>
      <span class="font-semibold text-sidebar-foreground">Finova</span>
    </div>
    <div class="w-9"></div>
  </header>

  <!-- Mobile Overlay -->
  @if (store.mobileOpen()) {
    <div
      class="fixed inset-0 z-50 bg-background/80 backdrop-blur-sm lg:hidden"
      (click)="store.setMobileOpen(false)"
    ></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-50 flex flex-col border-r border-sidebar-border bg-sidebar transition-all duration-300 ease-in-out"
    [ngClass]="{
      'w-16': store.collapsed(),
      'w-64': !store.collapsed(),
      'translate-x-0': store.mobileOpen(),
      '-translate-x-full lg:translate-x-0': !store.mobileOpen()
    }"
  >
    <!-- Logo -->
    <div class="flex h-14 items-center justify-between border-b border-sidebar-border px-4">
      <a routerLink="/" class="flex items-center gap-3 decoration-none">
        <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-primary">
          <span class="text-sm font-bold text-primary-foreground">F</span>
        </div>
        @if (!store.collapsed()) {
          <span class="font-semibold text-sidebar-foreground">Finova</span>
        }
      </a>
      <button
        (click)="store.setMobileOpen(false)"
        class="flex items-center justify-center rounded-md p-1.5 text-sidebar-foreground hover:bg-sidebar-accent lg:hidden"
        aria-label="Close menu"
      >
        <ng-icon name="lucideX" class="h-5 w-5"></ng-icon>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto p-3">
      <ul class="space-y-1">
        @for (item of navItems; track item.name) {
          <li>
            <a
              [routerLink]="item.href"
              routerLinkActive="bg-sidebar-primary text-sidebar-primary-foreground"
              #rla="routerLinkActive"
              [routerLinkActiveOptions]="{exact: item.href === '/'}"
              (click)="store.setMobileOpen(false)"
              class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
              [ngClass]="rla.isActive ? '' : 'text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground'"
            >
              <ng-icon [name]="item.icon" class="h-5 w-5 shrink-0"></ng-icon>
              @if (!store.collapsed()) {
                <span>{{ item.name }}</span>
              }
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- Bottom Navigation -->
    <div class="border-t border-sidebar-border p-3">
      <ul class="space-y-1">
        @for (item of bottomNavItems; track item.name) {
          <li>
            <a
              [routerLink]="item.href"
              routerLinkActive="bg-sidebar-primary text-sidebar-primary-foreground"
              #rlaB="routerLinkActive"
              (click)="store.setMobileOpen(false)"
              class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
              [ngClass]="rlaB.isActive ? '' : 'text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground'"
            >
              <ng-icon [name]="item.icon" class="h-5 w-5 shrink-0"></ng-icon>
              @if (!store.collapsed()) {
                <span>{{ item.name }}</span>
              }
            </a>
          </li>
        }
      </ul>

      <!-- Theme Toggle -->
      <button
        (click)="store.toggleTheme()"
        class="mt-3 flex w-full items-center justify-center gap-2 rounded-lg border border-sidebar-border px-3 py-2 text-sm text-sidebar-foreground transition-colors hover:bg-sidebar-accent"
      >
        @if (mounted) {
          @if (store.theme() === 'dark') {
            <ng-icon name="lucideSun" class="h-4 w-4"></ng-icon>
          } @else {
            <ng-icon name="lucideMoon" class="h-4 w-4"></ng-icon>
          }
          @if (!store.collapsed()) {
            <span>{{ store.theme() === 'dark' ? 'Light Mode' : 'Dark Mode' }}</span>
          }
        } @else {
          <ng-icon name="lucideSun" class="h-4 w-4"></ng-icon>
          @if (!store.collapsed()) {
            <span>Toggle Theme</span>
          }
        }
      </button>

      <!-- Collapse Button (Desktop only) -->
      <button
        (click)="store.toggleSidebar()"
        class="mt-3 hidden w-full items-center justify-center gap-2 rounded-lg border border-sidebar-border px-3 py-2 text-sm text-sidebar-foreground transition-colors hover:bg-sidebar-accent lg:flex"
      >
        <ng-icon 
          name="lucideChevronLeft" 
          class="h-4 w-4 transition-transform"
          [class.rotate-180]="store.collapsed()">
        </ng-icon>
        @if (!store.collapsed()) {
          <span>Collapse</span>
        }
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main
    class="flex-1 transition-all duration-300 ease-in-out pt-14 lg:pt-0"
    [ngClass]="{
      'lg:ml-16': store.collapsed(),
      'lg:ml-64': !store.collapsed()
    }"
  >
    <div class="min-h-screen">
      <ng-content></ng-content>
    </div>
  </main>
</div>
